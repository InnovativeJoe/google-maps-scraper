<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps Scraper</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/htmx/1.9.6/htmx.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-title-section">
                <h1>
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-primary-light);">
                        <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon>
                        <line x1="9" y1="3" x2="9" y2="18"></line>
                        <line x1="15" y1="6" x2="15" y2="21"></line>
                    </svg>
                    Google Maps Scraper
                </h1>
            </div>
            <div class="header-right">
                <nav>
                    <a href="/api/docs" target="_blank" rel="noopener noreferrer">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                        </svg>
                        API Docs
                    </a>
                </nav>
                <a href="https://github.com/gosom/google-maps-scraper" target="_blank" rel="noopener noreferrer" class="github-button">
                    <svg height="16" width="16" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                    </svg>
                    Star
                </a>
            </div>
        </header>

        <main>
            <div class="sidebar">
                <div id="error-container" class="error-message"></div>
                <form 
                    hx-post="/scrape" 
                    hx-target="#job-table tbody" 
                    hx-swap="beforeend"
                    hx-indicator="#spinner"
                    hx-on::before-request="document.getElementById('error-container').innerHTML = ''"
                    hx-on::after-request="if(!event.detail.successful) document.getElementById('error-container').innerHTML = event.detail.xhr.responseText"
                >
                    <fieldset>
                        <legend>
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                                <polyline points="10 9 9 9 8 9"></polyline>
                            </svg>
                            Job Details
                        </legend>
                        <div class="form-group">
                            <label for="name">Job Name</label>
                            <input type="text" id="name" name="name" value="{{.Name}}" placeholder="e.g. London Coffee Shops">
                        </div>
                        <div class="form-group">
                            <label for="keywords">Keywords (one per line)</label>
                            <textarea id="keywords" name="keywords" rows="6" placeholder="e.g. coffee shop London&#10;cafe Soho London">{{ .KeywordsString }}</textarea>
                        </div>
                    </fieldset>
                    
                    <details class="expandable-section">
                        <summary>
                            <span style="display: flex; align-items: center; gap: 8px;">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                    <circle cx="12" cy="10" r="3"></circle>
                                </svg>
                                Location Settings
                            </span>
                        </summary>
                        <fieldset>
                            <div class="form-group">
                                <label for="zoom">Zoom Level (0-21)</label>
                                <input type="number" id="zoom" name="zoom" value="{{.Zoom}}">
                            </div>
                            <div class="form-group">
                                <label for="latitude">Latitude</label>
                                <input type="number" step="0.000000000000001" id="latitude" name="latitude" value="{{.Lat}}" placeholder="e.g. 51.5074">
                            </div>
                            <div class="form-group">
                                <label for="longitude">Longitude</label>
                                <input type="number" step="0.000000000000001" id="longitude" name="longitude" value="{{.Lon}}" placeholder="e.g. -0.1278">
                            </div>
                        </fieldset>
                    </details>
                    
                    <details class="expandable-section">
                        <summary>
                            <span style="display: flex; align-items: center; gap: 8px;">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="3"></circle>
                                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                                </svg>
                                Advanced Options
                            </span>
                        </summary>
                        <fieldset>
                            <div class="form-group checkbox">
                                <input type="checkbox" id="fastmode" name="fastmode" {{if .FastMode}}checked{{end}}>
                                <label for="fastmode">Fast Mode (BETA)</label>
                            </div>
                            <div class="form-group">
                                <label for="radius">Radius (meters)</label>
                                <input type="number" id="radius" name="radius" value="{{.Radius}}">
                            </div>
                            <div class="form-group">
                                <label for="depth">Scroll Depth</label>
                                <input type="number" step="1" id="depth" name="depth" value="{{.Depth}}">
                            </div>
                            <div class="form-group checkbox">
                                <input type="checkbox" id="email" name="email" {{if .Email}}checked{{end}}>
                                <label for="email">Fetch Emails from Websites</label>
                            </div>
                            <div class="form-group">
                                <label for="maxtime">Max Job Duration</label>
                                <input type="text" id="maxtime" name="maxtime" value="{{.MaxTime}}" placeholder="e.g. 10m, 2h">
                            </div>
                        </fieldset>
                    </details>

                    <details class="expandable-section" open>
                        <summary>
                            <span style="display: flex; align-items: center; gap: 8px;">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                    <path d="M8 7h8"></path>
                                    <path d="M8 12h8"></path>
                                    <path d="M8 17h5"></path>
                                </svg>
                                Result Fields
                            </span>
                        </summary>
                        <fieldset>
                            <p class="text-muted">
                                Unchecked fields will be omitted from the exported CSV for this job.
                            </p>
                            <div class="field-toggle-grid">
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="link" name="link" {{if .Link}}checked{{end}}>
                                    <span>Link</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="title" name="title" {{if .Title}}checked{{end}}>
                                    <span>Title</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="category" name="category" {{if .Category}}checked{{end}}>
                                    <span>Category</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="address" name="address" {{if .Address}}checked{{end}}>
                                    <span>Address</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="open_hours" name="open_hours" {{if .OpenHours}}checked{{end}}>
                                    <span>Open hours</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="website" name="website" {{if .Website}}checked{{end}}>
                                    <span>Website</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="phone" name="phone" {{if .Phone}}checked{{end}}>
                                    <span>Phone</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="plus_code" name="plus_code" {{if .PlusCode}}checked{{end}}>
                                    <span>Plus code</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="review_count" name="review_count" {{if .ReviewCount}}checked{{end}}>
                                    <span>Review count</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="review_rating" name="review_rating" {{if .ReviewRating}}checked{{end}}>
                                    <span>Review rating</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="reviews_per_rating" name="reviews_per_rating" {{if .ReviewsPerRating}}checked{{end}}>
                                    <span>Reviews per rating</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="include_latitude" name="include_latitude" {{if .Latitude}}checked{{end}}>
                                    <span>Latitude</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="include_longitude" name="include_longitude" {{if .Longitude}}checked{{end}}>
                                    <span>Longitude</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="input_id" name="input_id" {{if .InputID}}checked{{end}}>
                                    <span>Input ID</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="popular_times" name="popular_times" {{if .PopularTimes}}checked{{end}}>
                                    <span>Popular times</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="cid" name="cid" {{if .Cid}}checked{{end}}>
                                    <span>CID</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="status" name="status" {{if .Status}}checked{{end}}>
                                    <span>Status</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="descriptions" name="descriptions" {{if .Descriptions}}checked{{end}}>
                                    <span>Descriptions</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="reviews_link" name="reviews_link" {{if .ReviewsLink}}checked{{end}}>
                                    <span>Reviews link</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="thumbnail" name="thumbnail" {{if .Thumbnail}}checked{{end}}>
                                    <span>Thumbnail</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="data_id" name="data_id" {{if .DataID}}checked{{end}}>
                                    <span>Data ID</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="street_view_url" name="street_view_url" {{if .StreetViewURL}}checked{{end}}>
                                    <span>Street view URL</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="place_id" name="place_id" {{if .PlaceID}}checked{{end}}>
                                    <span>Place ID</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="images" name="images" {{if .Images}}checked{{end}}>
                                    <span>Images</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="reservations" name="reservations" {{if .Reservations}}checked{{end}}>
                                    <span>Reservations</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="order_online" name="order_online" {{if .OrderOnline}}checked{{end}}>
                                    <span>Order online</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="menu" name="menu" {{if .Menu}}checked{{end}}>
                                    <span>Menu</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="owner" name="owner" {{if .Owner}}checked{{end}}>
                                    <span>Owner</span>
                                </label>
                                <label class="form-group checkbox field-toggle-item">
                                    <input type="checkbox" id="complete_address" name="complete_address" {{if .CompleteAddress}}checked{{end}}>
                                    <span>Complete address</span>
                                </label>
                            </div>
                        </fieldset>
                    </details>
                    
                    <details class="expandable-section">
                        <summary>
                            <span style="display: flex; align-items: center; gap: 8px;">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
                                    <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
                                    <line x1="6" y1="6" x2="6.01" y2="6"></line>
                                    <line x1="6" y1="18" x2="6.01" y2="18"></line>
                                </svg>
                                Proxies
                            </span>
                        </summary>
                        <fieldset>
                            <div class="form-group">
                                <label for="proxies">Proxy List (one per line)</label>
                                <textarea id="proxies" name="proxies" rows="4" placeholder="protocol://user:pass@host:port">{{.ProxiesString}}</textarea>
                                <p class="text-muted" style="margin-top: 6px;">
                                    Supports http, https, socks5 protocols.
                                </p>
                            </div>
                        </fieldset>
                    </details>
                    
                    <div class="form-actions">
                        <button type="submit" name="action" value="start" class="primary-button">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                            Start Scraping
                        </button>
                        <button type="submit" name="action" value="resume" class="secondary-button">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 5v14"></path>
                                <path d="M5 12h14"></path>
                            </svg>
                            Resume Scraping
                        </button>
                    </div>
                </form>
            </div>
            
            <div class="content">
                <div id="spinner" class="spinner"></div>
                <div class="table-wrapper">
                    <table id="job-table">
                        <thead>
                            <tr>
                                <th>Job ID</th>
                                <th>Job Name</th>
                                <th>Created Date</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody hx-get="/jobs" hx-trigger="load, every 10s">
                            <!-- Job rows inserted here by HTMX -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
